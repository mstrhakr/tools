name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "CNAME"
      - "css/**"
      - "js/**"
      - "tools/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate tools manifest
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          def read_display_info(folder):
            """Read displayInfo.json from a folder, returning defaults if missing."""
            info_path = folder / 'displayInfo.json'
            info = {}
            if info_path.exists():
              try:
                info = json.loads(info_path.read_text(encoding='utf-8'))
              except (json.JSONDecodeError, OSError):
                pass
            name = info.get('name') or folder.name.replace('-', ' ').title()
            return {
              'name': name,
              'description': info.get('description', ''),
              'order': info.get('order', 999),
              'tools': info.get('tools', []),
            }

          def clean_name(title, slug):
            name = (title or '').strip()
            name = re.sub(r'\s*-\s*mstrhakr\s+tools\s*$', '', name, flags=re.IGNORECASE).strip()
            if not name:
              name = slug.replace('-', ' ').title()
            return name

          def parse_title(html):
            m = re.search(r'<title>([^<]+)</title>', html, flags=re.IGNORECASE)
            return m.group(1).strip() if m else ''

          def parse_description(html):
            m = re.search(r'<div[^>]*class=["\'][^"\']*tool-header[^"\']*["\'][^>]*>[\s\S]*?<p>([\s\S]*?)</p>', html, flags=re.IGNORECASE)
            if not m:
              return ''
            desc = re.sub(r'<[^>]+>', '', m.group(1))
            return re.sub(r'\s+', ' ', desc).strip()

          tools_root = Path('tools')

          # Discover categories (immediate subdirectories with HTML files)
          categories = {}
          for cat_dir in sorted(tools_root.iterdir()):
            if not cat_dir.is_dir():
              continue
            cat_info = read_display_info(cat_dir)
            cat_slug = cat_dir.name

            # Build subcategory slug->tool mapping from displayInfo.json files
            subcategories = {}
            subcategory_order = []
            for sub_dir in sorted(cat_dir.iterdir()):
              if not sub_dir.is_dir():
                continue
              sub_info = read_display_info(sub_dir)
              sub_slug = sub_dir.name
              if sub_info['tools']:
                subcategories[sub_slug] = sub_info
                subcategory_order.append(sub_slug)

            # Sort subcategories by order
            subcategory_order.sort(key=lambda s: subcategories[s]['order'])

            # Build reverse map: tool_slug -> subcategory_slug
            tool_to_sub = {}
            for sub_slug, sub_info in subcategories.items():
              for tool_slug in sub_info['tools']:
                tool_to_sub[tool_slug] = sub_slug

            categories[cat_slug] = {
              'info': cat_info,
              'subcategories': subcategories,
              'subcategory_order': subcategory_order,
              'tool_to_sub': tool_to_sub,
            }

          # Discover all tools
          tools = []
          for html_path in tools_root.glob('*/*.html'):
            cat_slug = html_path.parent.name
            slug = html_path.stem
            rel = html_path.as_posix()
            html = html_path.read_text(encoding='utf-8')
            name = clean_name(parse_title(html), slug)
            description = parse_description(html)

            cat_data = categories.get(cat_slug, {})
            cat_info = cat_data.get('info', {})
            sub_slug = cat_data.get('tool_to_sub', {}).get(slug)
            sub_info = cat_data.get('subcategories', {}).get(sub_slug) if sub_slug else None

            tool_entry = {
              'category': cat_slug,
              'categoryName': cat_info.get('name', cat_slug.replace('-', ' ').title()),
              'name': name,
              'url': '/' + rel,
              'tags': (slug + ' ' + cat_slug + ' ' + name).lower(),
              'description': description,
            }
            if sub_slug:
              tool_entry['subcategory'] = sub_slug
              tool_entry['subcategoryName'] = sub_info['name']

            tools.append(tool_entry)

          # Sort: by category order, then subcategorized tools first (by sub order),
          # then uncategorized tools alphabetically
          def sort_key(t):
            cat_data = categories.get(t['category'], {})
            cat_order = cat_data.get('info', {}).get('order', 999)
            sub_slug = t.get('subcategory')
            if sub_slug:
              sub_info = cat_data.get('subcategories', {}).get(sub_slug, {})
              sub_order = sub_info.get('order', 999)
              return (cat_order, 0, sub_order, t['name'].lower())
            else:
              return (cat_order, 1, 0, t['name'].lower())
          tools.sort(key=sort_key)

          # Build subcategory metadata for the manifest
          subcategory_meta = {}
          for cat_slug, cat_data in categories.items():
            if cat_data['subcategory_order']:
              subcategory_meta[cat_slug] = []
              for sub_slug in cat_data['subcategory_order']:
                sub_info = cat_data['subcategories'][sub_slug]
                subcategory_meta[cat_slug].append({
                  'slug': sub_slug,
                  'name': sub_info['name'],
                  'description': sub_info.get('description', ''),
                  'order': sub_info['order'],
                })

          manifest = {
            'tools': tools,
            'subcategories': subcategory_meta,
          }

          Path('tools-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          print(f'Wrote tools-manifest.json with {len(tools)} tools')
          for cat_slug, subs in subcategory_meta.items():
            print(f'  {cat_slug}: {len(subs)} subcategories')
          PY

      - name: Commit manifest changes
        run: |
          if git diff --quiet -- tools-manifest.json; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools-manifest.json
          git commit -m "chore: update tools manifest [skip ci]"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
