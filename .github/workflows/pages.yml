name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "CNAME"
      - "css/**"
      - "js/**"
      - "tools/**"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Generate tools manifest
        run: |
          python3 - <<'PY'
          import json
          import re
          from pathlib import Path

          category_order = ['converter', 'encoding', 'text', 'math', 'generator', 'network', 'security', 'dev']
          order_index = {name: idx for idx, name in enumerate(category_order)}

          def clean_name(title, slug):
            name = (title or '').strip()
            name = re.sub(r'\s*-\s*mstrhakr\s+tools\s*$', '', name, flags=re.IGNORECASE).strip()
            if not name:
              name = slug.replace('-', ' ').title()
            return name

          def parse_title(html):
            m = re.search(r'<title>([^<]+)</title>', html, flags=re.IGNORECASE)
            return m.group(1).strip() if m else ''

          def parse_description(html):
            m = re.search(r'<div[^>]*class=["\'][^"\']*tool-header[^"\']*["\'][^>]*>[\s\S]*?<p>([\s\S]*?)</p>', html, flags=re.IGNORECASE)
            if not m:
              return ''
            desc = re.sub(r'<[^>]+>', '', m.group(1))
            return re.sub(r'\s+', ' ', desc).strip()

          tools = []
          for html_path in Path('tools').glob('*/*.html'):
            category = html_path.parent.name
            slug = html_path.stem
            rel = html_path.as_posix()
            html = html_path.read_text(encoding='utf-8')
            name = clean_name(parse_title(html), slug)
            description = parse_description(html)
            tools.append({
              'category': category,
              'name': name,
              'url': '/' + rel,
              'tags': (slug + ' ' + category + ' ' + name).lower(),
              'description': description,
            })

          tools.sort(key=lambda t: (order_index.get(t['category'], 999), t['name'].lower()))

          manifest = {
            'tools': tools,
          }

          Path('tools-manifest.json').write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          print(f'Wrote tools-manifest.json with {len(tools)} tools')
          PY

      - name: Commit manifest changes
        run: |
          if git diff --quiet -- tools-manifest.json; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tools-manifest.json
          git commit -m "chore: update tools manifest [skip ci]"
          git push

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
