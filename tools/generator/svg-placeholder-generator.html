<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG Placeholder Generator - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>SVG Placeholder Generator</h1>
      <p>Create lightweight SVG image placeholders with custom size, colors, and center label</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group">
          <label for="svgp-width">Width</label>
          <input type="number" id="svgp-width" value="1200" min="1">
        </div>
        <div class="input-group">
          <label for="svgp-height">Height</label>
          <input type="number" id="svgp-height" value="630" min="1">
        </div>
        <div class="input-group">
          <label for="svgp-font-size">Font size</label>
          <input type="number" id="svgp-font-size" value="48" min="1">
        </div>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label for="svgp-bg">Background color</label>
          <input type="color" id="svgp-bg" value="#1f2937">
        </div>
        <div class="input-group">
          <label for="svgp-fg">Text color</label>
          <input type="color" id="svgp-fg" value="#f9fafb">
        </div>
        <div class="input-group">
          <label for="svgp-text">Center text</label>
          <input type="text" id="svgp-text" value="1200x630">
        </div>
      </div>

      <div class="btn-group">
        <button class="btn" id="btn-svgp-generate">Generate</button>
        <button class="btn btn-secondary" id="btn-svgp-copy">copy svg</button>
      </div>

      <div class="result mt-2">
        <div class="result-label">Preview</div>
        <div id="svgp-preview" style="display:flex;justify-content:center;align-items:center;overflow:auto"></div>
      </div>

      <div class="input-group mt-2">
        <label for="svgp-output">SVG markup</label>
        <textarea id="svgp-output" rows="10" readonly></textarea>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/svg-placeholder-generator.js"></script>
</body>
</html>
