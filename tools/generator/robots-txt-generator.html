<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robots.txt Generator - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Robots.txt Generator</h1>
      <p>Build crawler directives for common bots, disallow paths, and sitemap declarations</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group">
          <label for="robots-user-agent">User-agent</label>
          <input type="text" id="robots-user-agent" value="*" placeholder="*">
        </div>
        <div class="input-group">
          <label for="robots-crawl-delay">Crawl-delay (optional)</label>
          <input type="number" id="robots-crawl-delay" min="0" step="1" placeholder="5">
        </div>
      </div>

      <div class="input-group">
        <label for="robots-allow">Allow paths (one per line)</label>
        <textarea id="robots-allow" rows="4" placeholder="/\n/blog/"></textarea>
      </div>

      <div class="input-group">
        <label for="robots-disallow">Disallow paths (one per line)</label>
        <textarea id="robots-disallow" rows="4" placeholder="/admin/\n/private/"></textarea>
      </div>

      <div class="input-group">
        <label for="robots-sitemaps">Sitemap URLs (one per line)</label>
        <textarea id="robots-sitemaps" rows="3" placeholder="https://example.com/sitemap.xml"></textarea>
      </div>

      <div class="btn-group">
        <button class="btn" id="btn-robots-generate">Generate</button>
        <button class="btn btn-secondary" id="btn-robots-copy">copy output</button>
      </div>

      <div class="input-group mt-2">
        <label for="robots-output">robots.txt</label>
        <textarea id="robots-output" rows="12" readonly></textarea>
      </div>
    </div>

    <div class="tool-info">
      <h3>Reminder</h3>
      <p>robots.txt is advisory, not access control. Use authentication and authorization for private content.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/robots-txt-generator.js"></script>
</body>
</html>
