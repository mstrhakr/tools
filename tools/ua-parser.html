<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User-Agent Parser - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links">
          <li><a href="/">home</a></li>
          <li><a href="/tools/calculator.html">calculator</a></li>
          <li><a href="/tools/data-size-converter.html">data size</a></li>
          <li><a href="/tools/subnet-calculator.html">subnet</a></li>
          <li><button class="theme-toggle" aria-label="Toggle theme">light</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>User-Agent Parser</h1>
      <p>Parse any User-Agent string into browser, engine, OS, and device details</p>
    </div>

    <div class="tool-section">
      <div class="input-group">
        <label for="ua-input">User-Agent string</label>
        <textarea id="ua-input" rows="3" placeholder="Mozilla/5.0 ..."></textarea>
      </div>
      <div class="btn-group">
        <button class="btn" id="btn-parse">Parse</button>
        <button class="btn btn-secondary" id="btn-my-ua">Use my UA</button>
        <button class="btn btn-secondary" id="btn-clear">Clear</button>
      </div>
    </div>

    <div id="ua-results"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/ua-parser.js"></script>
</body>
