<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color Picker - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Color Picker</h1>
      <p>Pick colors and convert between Hex, RGB, and HSL formats</p>
    </div>

    <div class="tool-section">
      <div class="color-preview" id="color-preview"></div>

      <div class="input-group">
        <label for="color-picker">Color Picker</label>
        <input type="color" id="color-picker" value="#268bd2" style="width:100%">
      </div>

      <div class="input-row mt-2">
        <div class="input-group">
          <label for="hex-input">Hex</label>
          <div class="input-row">
            <input type="text" id="hex-input" value="#268bd2" maxlength="7">
            <button class="btn btn-sm btn-secondary" id="copy-hex">copy</button>
          </div>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="rgb-r">R</label>
          <input type="number" id="rgb-r" min="0" max="255" value="38">
        </div>
        <div class="input-group">
          <label for="rgb-g">G</label>
          <input type="number" id="rgb-g" min="0" max="255" value="139">
        </div>
        <div class="input-group">
          <label for="rgb-b">B</label>
          <input type="number" id="rgb-b" min="0" max="255" value="210">
        </div>
        <div class="input-group" style="flex:0 0 auto;align-self:flex-end">
          <button class="btn btn-sm btn-secondary" id="copy-rgb">copy</button>
        </div>
      </div>

      <div class="input-row">
        <div class="input-group">
          <label for="hsl-h">H</label>
          <input type="number" id="hsl-h" min="0" max="360" value="205">
        </div>
        <div class="input-group">
          <label for="hsl-s">S%</label>
          <input type="number" id="hsl-s" min="0" max="100" value="69">
        </div>
        <div class="input-group">
          <label for="hsl-l">L%</label>
          <input type="number" id="hsl-l" min="0" max="100" value="49">
        </div>
        <div class="input-group" style="flex:0 0 auto;align-self:flex-end">
          <button class="btn btn-sm btn-secondary" id="copy-hsl">copy</button>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/color-picker.js"></script>
</body>
</html>
