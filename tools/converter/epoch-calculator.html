<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Epoch / Duration Calculator - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Epoch / Duration Calculator</h1>
      <p>Calculate the duration between two dates and see the difference broken down</p>
    </div>

    <div class="tool-section">
      <h2>Date difference</h2>
      <div class="input-row">
        <div class="input-group">
          <label for="date-start">Start date &amp; time</label>
          <input type="datetime-local" id="date-start">
        </div>
        <div class="input-group">
          <label for="date-end">End date &amp; time</label>
          <input type="datetime-local" id="date-end">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn" id="btn-calc-diff">Calculate</button>
        <button class="btn btn-secondary" id="btn-now-start">Set start to now</button>
        <button class="btn btn-secondary" id="btn-now-end">Set end to now</button>
      </div>
      <div id="diff-results" class="stats-grid mt-2"></div>
    </div>

    <div class="tool-section">
      <h2>Add / subtract duration</h2>
      <div class="input-group">
        <label for="base-date">Base date &amp; time</label>
        <input type="datetime-local" id="base-date">
      </div>
      <div class="input-row">
        <div class="input-group"><label for="add-years">Years</label><input type="number" id="add-years" value="0"></div>
        <div class="input-group"><label for="add-months">Months</label><input type="number" id="add-months" value="0"></div>
        <div class="input-group"><label for="add-days">Days</label><input type="number" id="add-days" value="0"></div>
        <div class="input-group"><label for="add-hours">Hours</label><input type="number" id="add-hours" value="0"></div>
        <div class="input-group"><label for="add-minutes">Minutes</label><input type="number" id="add-minutes" value="0"></div>
      </div>
      <div class="btn-group">
        <button class="btn" id="btn-add">Add</button>
        <button class="btn btn-secondary" id="btn-sub">Subtract</button>
      </div>
      <div id="add-result" class="result mt-2" style="display:none"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/epoch-calculator.js"></script>
</body>
</html>
