<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Number Base Converter - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Number Base Converter</h1>
      <p>Convert between binary, octal, decimal, and hexadecimal — plus any custom base from 2 to 36</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group" style="flex:3">
          <label for="base-input">Value</label>
          <input type="text" id="base-input" placeholder="255" autocomplete="off" spellcheck="false">
        </div>
        <div class="input-group" style="flex:1">
          <label for="base-from">From base</label>
          <select id="base-from">
            <option value="2">Binary (2)</option>
            <option value="8">Octal (8)</option>
            <option value="10" selected>Decimal (10)</option>
            <option value="16">Hex (16)</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="input-group" style="flex:1" id="custom-base-wrap" style="display:none">
          <label for="base-from-custom">Base</label>
          <input type="number" id="base-from-custom" value="10" min="2" max="36">
        </div>
      </div>
      <div class="btn-group">
        <button class="btn" id="btn-convert">Convert</button>
      </div>
    </div>

    <div id="base-results"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/number-base.js"></script>
</body>
</html>
