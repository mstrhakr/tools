<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Generator - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links">
          <li><a href="/">home</a></li>
          <li><a href="/tools/calculator.html">calculator</a></li>
          <li><a href="/tools/data-size-converter.html">data size</a></li>
          <li><a href="/tools/subnet-calculator.html">subnet</a></li>
          <li><button class="theme-toggle" aria-label="Toggle theme">light</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Password Generator</h1>
      <p>Generate secure random passwords with configurable options</p>
    </div>

    <div class="tool-section" style="max-width: 550px;">
      <div class="result mb-2">
        <div class="result-value" id="password-output" style="word-break:break-all;font-size:1.1rem;">--</div>
      </div>

      <div class="btn-group mb-2">
        <button class="btn" id="btn-generate">Generate</button>
        <button class="btn btn-secondary" id="btn-copy">Copy</button>
      </div>

      <div class="strength-meter mb-1">
        <div class="strength-meter-fill" id="strength-fill"></div>
      </div>
      <div class="strength-label text-muted" id="strength-label"></div>

      <div class="input-group mt-2">
        <label for="pw-length">Length: <strong id="pw-length-val">16</strong></label>
        <input type="range" id="pw-length" min="4" max="128" value="16">
      </div>

      <div class="input-group">
        <label><input type="checkbox" id="opt-upper" checked> Uppercase (A-Z)</label>
      </div>
      <div class="input-group">
        <label><input type="checkbox" id="opt-lower" checked> Lowercase (a-z)</label>
      </div>
      <div class="input-group">
        <label><input type="checkbox" id="opt-digits" checked> Digits (0-9)</label>
      </div>
      <div class="input-group">
        <label><input type="checkbox" id="opt-symbols" checked> Symbols (!@#$%...)</label>
      </div>
      <div class="input-group">
        <label><input type="checkbox" id="opt-exclude-ambiguous"> Exclude ambiguous (0O1lI)</label>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/password-generator.js"></script>
</body>
</html>
