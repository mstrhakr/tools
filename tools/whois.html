<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WHOIS Lookup - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links">
          <li><a href="/">home</a></li>
          <li><a href="/tools/calculator.html">calculator</a></li>
          <li><a href="/tools/data-size-converter.html">data size</a></li>
          <li><a href="/tools/subnet-calculator.html">subnet</a></li>
          <li><button class="theme-toggle" aria-label="Toggle theme">light</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>WHOIS Lookup</h1>
      <p>Query registration information for domains (via IANA) and IP addresses (via ARIN)</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group" style="flex:3">
          <label for="whois-input">Domain or IP address</label>
          <input type="text" id="whois-input" placeholder="example.com or 8.8.8.8" autocomplete="off" spellcheck="false">
        </div>
        <div class="input-group" style="flex:0 0 auto;align-self:flex-end">
          <button class="btn" id="whois-btn">Lookup</button>
        </div>
      </div>
      <span id="whois-loader" style="display:none;color:var(--fg-muted);font-size:0.875rem">querying...</span>
      <div id="whois-error" class="text-error mt-1" style="display:none"></div>
    </div>

    <div id="whois-results"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/whois.js"></script>
</body>
</html>
