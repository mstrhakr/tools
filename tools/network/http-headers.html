<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTTP Headers - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links">
          <li><a href="/">home</a></li>
          <li><a href="/tools/calculator.html">calculator</a></li>
          <li><a href="/tools/data-size-converter.html">data size</a></li>
          <li><a href="/tools/subnet-calculator.html">subnet</a></li>
          <li><button class="theme-toggle" aria-label="Toggle theme">light</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>HTTP Headers Inspector</h1>
      <p>Fetch and inspect HTTP response headers including security headers analysis. Requires the self-hosted backend at <code>api.tools.mstrhakr.com</code>.</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group" style="flex:4">
          <label for="headers-url">URL</label>
          <input type="text" id="headers-url" placeholder="https://example.com" autocomplete="off" spellcheck="false">
        </div>
        <div style="flex:0;padding-bottom:1rem">
          <button class="btn" id="headers-btn">inspect</button>
        </div>
      </div>
      <span id="headers-loader" style="display:none;color:var(--fg-muted);font-size:0.875rem">fetching...</span>
      <div id="headers-error" class="text-error mt-1" style="display:none"></div>
    </div>

    <div id="headers-results"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/http-headers.js"></script>
</body>
</html>
