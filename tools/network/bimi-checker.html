<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BIMI Checker - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>BIMI Checker <span class="badge badge-api">backend api</span></h1>
      <p>Inspect BIMI DNS record tags including logo URL and optional VMC</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group" style="flex:2">
          <label for="bimi-domain">Domain</label>
          <input type="text" id="bimi-domain" placeholder="example.com" autocomplete="off" spellcheck="false">
        </div>
        <div class="input-group" style="flex:1">
          <label for="bimi-selector">Selector</label>
          <input type="text" id="bimi-selector" value="default" autocomplete="off" spellcheck="false">
        </div>
        <div class="input-group" style="flex:0 0 auto;align-self:flex-end">
          <button class="btn" id="bimi-btn">Check</button>
        </div>
      </div>
      <span id="bimi-loader" style="display:none;color:var(--fg-muted);font-size:0.875rem">checking...</span>
      <div id="bimi-error" class="text-error mt-1" style="display:none"></div>
    </div>

    <div id="bimi-results"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/bimi-checker.js"></script>
</body>
</html>
