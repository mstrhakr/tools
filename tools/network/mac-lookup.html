<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAC Address Lookup - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>MAC Address Lookup</h1>
      <p>Identify the manufacturer from a MAC address OUI prefix</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group">
          <label for="mac-input">MAC Address</label>
          <input type="text" id="mac-input" placeholder="AA:BB:CC:DD:EE:FF or AA-BB-CC" maxlength="17">
        </div>
        <div class="input-group" style="flex:0 0 auto;align-self:flex-end">
          <button class="btn" id="btn-lookup">Lookup</button>
        </div>
      </div>

      <p class="text-muted mt-1" style="font-size:0.8rem">Enter at least the first 3 octets (6 hex chars). Accepts formats: AA:BB:CC, AA-BB-CC, AABBCC, or full MAC address.</p>

      <div id="mac-error" class="text-error mt-1" style="display:none"></div>

      <div class="stats-grid mt-2" id="mac-results"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/mac-lookup.js"></script>
</body>
</html>
