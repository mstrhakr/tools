<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Port Scanner - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Port Scanner</h1>
      <p>Check common ports (21-27017) on a host. Scans ~25 well-known ports via TCP connect from the backend server. Requires the self-hosted backend at <code>api.tools.mstrhakr.com</code>.</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group" style="flex:3">
          <label for="ps-host">Hostname or IP</label>
          <input type="text" id="ps-host" placeholder="example.com" autocomplete="off" spellcheck="false">
        </div>
        <div style="flex:0;padding-bottom:1rem">
          <button class="btn" id="ps-btn">scan</button>
        </div>
      </div>
      <label style="display:flex;align-items:center;gap:0.5rem;margin-top:0;font-size:0.85rem;cursor:pointer">
        <input type="checkbox" id="ps-open-only"> show open ports only
      </label>
      <span id="ps-loader" style="display:none;color:var(--fg-muted);font-size:0.875rem;margin-top:0.5rem;display:none">scanning... this may take a few seconds</span>
      <div id="ps-error" class="text-error mt-1" style="display:none"></div>
    </div>

    <div id="ps-summary" style="font-size:0.875rem;color:var(--fg-muted);margin-top:0.75rem"></div>
    <div id="ps-results"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/port-scanner.js"></script>
</body>
</html>
