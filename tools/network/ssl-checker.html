<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SSL Cert Checker - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>SSL Cert Checker</h1>
      <p>Inspect TLS certificates, expiry, issuer, SANs and cipher suite. Requires the self-hosted backend at <code>api.tools.mstrhakr.com</code>.</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group" style="flex:3">
          <label for="ssl-host">Hostname or URL</label>
          <input type="text" id="ssl-host" placeholder="example.com" autocomplete="off" spellcheck="false">
        </div>
        <div style="flex:0;padding-bottom:1rem">
          <button class="btn" id="ssl-btn">check</button>
        </div>
      </div>
      <span id="ssl-loader" style="display:none;color:var(--fg-muted);font-size:0.875rem">checking...</span>
      <div id="ssl-error" class="text-error mt-1" style="display:none"></div>
    </div>

    <div id="ssl-results"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/ssl-checker.js"></script>
</body>
</html>
