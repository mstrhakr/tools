<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JSON Schema Validator - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>JSON Schema Validator</h1>
      <p>Validate JSON data against a JSON Schema using Ajv in the browser</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group">
          <label for="jsv-schema">Schema</label>
          <textarea id="jsv-schema" rows="14"></textarea>
        </div>
        <div class="input-group">
          <label for="jsv-data">Data</label>
          <textarea id="jsv-data" rows="14"></textarea>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn" id="btn-jsv-validate">Validate</button>
        <button class="btn btn-secondary" id="btn-jsv-format">format inputs</button>
      </div>

      <div id="jsv-status" class="mt-2 text-muted"></div>
      <div id="jsv-results"></div>
    </div>

    <div class="tool-info">
      <h3>Notes</h3>
      <p>Validation runs locally using Ajv draft-2020 support. This tool validates structure and constraints but does not fetch remote refs.</p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ajv@8/dist/ajv2020.min.js"></script>
  <script src="/js/json-schema-validator.js"></script>
</body>
</html>
