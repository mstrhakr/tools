<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Base64 Encode / Decode - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links">
          <li><a href="/">home</a></li>
          <li><a href="/tools/calculator.html">calculator</a></li>
          <li><a href="/tools/data-size-converter.html">data size</a></li>
          <li><a href="/tools/subnet-calculator.html">subnet</a></li>
          <li><button class="theme-toggle" aria-label="Toggle theme">light</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Base64 Encode / Decode</h1>
      <p>Encode and decode Base64 strings with full UTF-8 support</p>
    </div>

    <div class="tool-section">
      <div class="input-group">
        <label for="input-text">Input</label>
        <textarea id="input-text" rows="6" placeholder="Enter text to encode or Base64 to decode..."></textarea>
      </div>

      <div class="btn-group mb-2">
        <button class="btn" id="btn-encode">Encode</button>
        <button class="btn" id="btn-decode">Decode</button>
        <button class="btn btn-secondary" id="btn-swap">Swap</button>
        <button class="btn btn-secondary" id="btn-clear">Clear</button>
      </div>

      <div class="input-group">
        <label for="output-text">Output</label>
        <textarea id="output-text" rows="6" readonly></textarea>
      </div>

      <div class="btn-group mt-1">
        <button class="btn btn-secondary btn-sm" id="btn-copy">Copy Output</button>
      </div>

      <div id="error-msg" class="text-error mt-1" style="display:none"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/base64.js"></script>
</body>
</html>
