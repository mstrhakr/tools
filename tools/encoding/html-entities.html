<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML Entity Encoder / Decoder - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links">
          <li><a href="/">home</a></li>
          <li><a href="/tools/calculator.html">calculator</a></li>
          <li><a href="/tools/data-size-converter.html">data size</a></li>
          <li><a href="/tools/subnet-calculator.html">subnet</a></li>
          <li><button class="theme-toggle" aria-label="Toggle theme">light</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>HTML Entity Encoder / Decoder</h1>
      <p>Escape and unescape HTML entities including named, decimal, and hex forms</p>
    </div>

    <div class="tool-section">
      <div class="input-group">
        <label for="entity-input">Input</label>
        <textarea id="entity-input" rows="6" placeholder="<div class=&quot;hello&quot;>World &amp; beyond &copy;</div>"></textarea>
      </div>

      <div class="btn-group mb-2">
        <button class="btn" id="btn-encode">Encode (text → entities)</button>
        <button class="btn btn-secondary" id="btn-decode">Decode (entities → text)</button>
        <button class="btn btn-secondary" id="btn-swap">Swap</button>
        <button class="btn btn-secondary" id="btn-clear">Clear</button>
      </div>

      <div class="input-group">
        <label for="entity-output">Output</label>
        <textarea id="entity-output" rows="6" readonly></textarea>
      </div>

      <div class="btn-group mt-1">
        <button class="btn btn-secondary btn-sm" id="btn-copy">Copy Output</button>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/html-entities.js"></script>
</body>
</html>
