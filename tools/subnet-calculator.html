<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Subnet Calculator - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links">
          <li><a href="/">home</a></li>
          <li><a href="/tools/calculator.html">calculator</a></li>
          <li><a href="/tools/data-size-converter.html">data size</a></li>
          <li><a href="/tools/subnet-calculator.html">subnet</a></li>
          <li><button class="theme-toggle" aria-label="Toggle theme">light</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Subnet Calculator</h1>
      <p>Calculate network address, broadcast, host range and subnet details from an IP and CIDR prefix</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group" style="flex:3">
          <label for="ip-input">IP Address</label>
          <input type="text" id="ip-input" placeholder="192.168.1.0" value="192.168.1.0">
        </div>
        <div class="input-group" style="flex:1">
          <label for="cidr-input">/ CIDR</label>
          <input type="number" id="cidr-input" min="0" max="32" value="24">
        </div>
      </div>

      <div id="subnet-error" class="text-error mt-1" style="display:none"></div>

      <div class="subnet-results mt-2" id="subnet-results"></div>

      <div class="mt-2" id="subnet-table-wrapper" style="display:none">
        <h2 style="font-size:1rem;color:var(--fg-emphasis);margin-bottom:0.75rem">All /24 - /30 subnets in this network</h2>
        <table class="conversion-table" id="subnet-table">
          <thead>
            <tr>
              <th>CIDR</th>
              <th>Subnet Mask</th>
              <th>Addresses</th>
              <th>Usable Hosts</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/subnet-calculator.js"></script>
</body>
</html>
