<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lorem Ipsum Generator - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links"></ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Lorem Ipsum Generator</h1>
      <p>Generate placeholder text by paragraphs, sentences, or words</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group" style="flex:1">
          <label for="lorem-count">Count</label>
          <input type="number" id="lorem-count" value="3" min="1" max="100">
        </div>
        <div class="input-group" style="flex:2">
          <label for="lorem-unit">Unit</label>
          <select id="lorem-unit">
            <option value="paragraphs">Paragraphs</option>
            <option value="sentences">Sentences</option>
            <option value="words">Words</option>
          </select>
        </div>
        <div class="input-group" style="flex:0 0 auto;align-self:flex-end">
          <button class="btn" id="btn-generate">Generate</button>
        </div>
      </div>

      <div class="btn-group mt-1">
        <label style="display:flex;align-items:center;gap:0.4rem;font-size:0.85rem;cursor:pointer">
          <input type="checkbox" id="lorem-classic" checked> Start with classic "Lorem ipsum..."
        </label>
      </div>
    </div>

    <div class="tool-section" id="lorem-output-section" style="display:none">
      <div class="btn-group mb-2">
        <button class="btn btn-secondary btn-sm" id="btn-copy">Copy</button>
      </div>
      <div id="lorem-output"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/lorem-ipsum.js"></script>
</body>
</html>
