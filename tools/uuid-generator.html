<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UUID Generator - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links">
          <li><a href="/">home</a></li>
          <li><a href="/tools/calculator.html">calculator</a></li>
          <li><a href="/tools/data-size-converter.html">data size</a></li>
          <li><a href="/tools/subnet-calculator.html">subnet</a></li>
          <li><button class="theme-toggle" aria-label="Toggle theme">light</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>UUID Generator</h1>
      <p>Generate v4 UUIDs individually or in bulk</p>
    </div>

    <div class="tool-section">
      <div class="input-row">
        <div class="input-group">
          <label for="uuid-count">Quantity</label>
          <input type="number" id="uuid-count" value="1" min="1" max="100" step="1">
        </div>
        <div class="input-group" style="flex:0 0 auto;align-self:flex-end">
          <div class="btn-group">
            <button class="btn" id="btn-generate">Generate</button>
            <button class="btn btn-secondary" id="btn-copy-all">Copy All</button>
          </div>
        </div>
      </div>

      <ul class="output-list mt-2" id="uuid-list"></ul>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/uuid-generator.js"></script>
</body>
</html>
