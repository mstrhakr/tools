<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cron Parser - mstrhakr tools</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>%F0%9F%94%A7</text></svg>">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .preset-grid {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrapper">
      <a href="/" class="site-title">mstrhakr tools</a>
      <button class="hamburger" aria-label="Menu" aria-expanded="false">[=]</button>
      <nav>
        <ul class="nav-links">
          <li><a href="/">home</a></li>
          <li><a href="/tools/calculator.html">calculator</a></li>
          <li><a href="/tools/data-size-converter.html">data size</a></li>
          <li><a href="/tools/subnet-calculator.html">subnet</a></li>
          <li><button class="theme-toggle" aria-label="Toggle theme">light</button></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="container">
    <div class="tool-header">
      <h1>Cron Parser</h1>
      <p>Parse and explain cron expressions in plain English</p>
    </div>

    <div class="tool-section">
      <div class="input-group">
        <label for="cron-input">Cron expression <span style="color:var(--fg-muted)">(minute hour dom month dow)</span></label>
        <input type="text" id="cron-input" placeholder="*/15 * * * *" spellcheck="false" autocomplete="off">
      </div>

      <div id="cron-error" class="text-error" style="display:none"></div>

      <div id="cron-desc" class="result" style="min-height:2.5rem;font-size:1rem;color:var(--accent)"></div>

      <div class="preset-grid" id="cron-presets"></div>
    </div>

    <div id="cron-fields"></div>
  </main>

  <footer class="site-footer">
    <div class="container">
      mstrhakr tools &middot; <a href="https://github.com/mstrhakr/tools">github</a>
    </div>
  </footer>

  <script src="/js/common.js"></script>
  <script src="/js/cron-parser.js"></script>
</body>
</html>
